<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>동부1 심포지엄 관리</title>
<style>
:root{
  --bg:#ffffff;--bg2:#f8f8f6;--bg3:#f2f1ee;--bg4:#eae9e5;
  --text:#1a1a1a;--text2:#5a5a5a;--text3:#9a9a9a;
  --border:rgba(0,0,0,0.08);--border2:rgba(0,0,0,0.15);
  --accent:#5B4FE8;--accent-bg:#F0EEFF;--accent-light:#E8E4FF;
  --green:#1a7a3a;--green-bg:#e8f5ec;--green-mid:#2a9a4a;
  --teal:#0a6656;--teal-bg:#e0f5f0;--teal-mid:#0e8a70;
  --amber:#7a4800;--amber-bg:#fff3e0;
  --red:#8a1a1a;--red-bg:#ffeaea;--red-mid:#b32020;
  --blue:#1a4a8a;--blue-bg:#e8f0ff;--blue-mid:#2660c0;
  --radius:12px;--radius-lg:16px;--radius-xl:20px;
  --shadow:0 2px 8px rgba(0,0,0,0.06),0 0 0 1px rgba(0,0,0,0.06);
  --shadow-lg:0 8px 24px rgba(0,0,0,0.10),0 0 0 1px rgba(0,0,0,0.06);
}
@media(prefers-color-scheme:dark){:root{
  --bg:#161616;--bg2:#1e1e1e;--bg3:#242424;--bg4:#2c2c2c;
  --text:#f0f0f0;--text2:#a8a8a8;--text3:#5a5a5a;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.14);
  --accent:#7B6FF8;--accent-bg:#1e1a3a;--accent-light:#2a2450;
  --green:#4aad6a;--green-bg:#0d2416;--green-mid:#3a9a58;
  --teal:#2dd4b0;--teal-bg:#061e18;--teal-mid:#1faa88;
  --amber:#f0a040;--amber-bg:#1e1200;
  --red:#f08080;--red-bg:#1e0808;--red-mid:#e05050;
  --blue:#6090e0;--blue-bg:#0a1428;--blue-mid:#4070c0;
  --shadow:0 2px 8px rgba(0,0,0,0.3),0 0 0 1px rgba(255,255,255,0.06);
  --shadow-lg:0 8px 24px rgba(0,0,0,0.4),0 0 0 1px rgba(255,255,255,0.06);
}}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,'Apple SD Gothic Neo','Malgun Gothic','Noto Sans KR',sans-serif;background:var(--bg3);color:var(--text);min-height:100vh}

/* ── 상단바 ── */
.topbar{position:sticky;top:0;z-index:50;background:var(--bg);border-bottom:1px solid var(--border);padding:0 20px;display:flex;align-items:center;justify-content:space-between;height:62px;backdrop-filter:blur(12px)}
.topbar-left{display:flex;align-items:center;gap:12px}
.topbar-logo{width:36px;height:36px;border-radius:10px;background:var(--accent);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.topbar-title{font-size:16px;font-weight:800;color:var(--text);letter-spacing:-.4px}
.topbar-sub{font-size:11px;color:var(--text3);margin-top:1px;display:flex;align-items:center;gap:4px}
.live-dot{width:6px;height:6px;border-radius:50%;background:var(--teal-mid);animation:pulse 2s infinite;flex-shrink:0}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.85)}}
.topbar-right{display:flex;gap:6px;align-items:center}
.btn-icon{background:var(--bg2);border:1px solid var(--border2);border-radius:10px;padding:9px 11px;font-size:16px;cursor:pointer;color:var(--text);transition:background .15s;line-height:1}
.btn-icon:hover{background:var(--bg4)}
.btn-add{background:var(--accent);color:#fff;border:none;border-radius:10px;padding:10px 20px;font-size:14px;font-weight:700;cursor:pointer;white-space:nowrap;letter-spacing:-.3px;transition:opacity .15s;display:flex;align-items:center;gap:6px}
.btn-add:hover{opacity:.88}

/* ── 뷰탭 ── */
.view-tabs{display:flex;background:var(--bg);border-bottom:1px solid var(--border);padding:0 20px}
.view-tab{padding:13px 20px;font-size:14px;font-weight:500;cursor:pointer;border:none;border-bottom:2.5px solid transparent;color:var(--text3);background:none;transition:all .15s;letter-spacing:-.3px}
.view-tab.on{color:var(--accent);border-bottom-color:var(--accent);font-weight:700}

/* ── 필터 ── */
.filter-scroll{overflow-x:auto;background:var(--bg);border-bottom:1px solid var(--border);padding:10px 20px}
.filter-scroll::-webkit-scrollbar{display:none}
.filter-inner{display:flex;gap:6px;width:max-content}
.chip{padding:8px 16px;border-radius:20px;font-size:13px;font-weight:500;cursor:pointer;white-space:nowrap;border:1px solid var(--border2);background:transparent;color:var(--text2);transition:all .15s}
.chip:hover{background:var(--bg2)}
.chip.on{background:var(--accent);color:#fff;border-color:var(--accent)}

/* ── 섹션 헤더 ── */
.month-header{font-size:11px;font-weight:800;color:var(--text3);letter-spacing:.1em;text-transform:uppercase;padding:20px 20px 8px;display:flex;align-items:center;gap:6px}

/* ── 카드 ── */
.card-list{padding:0 16px;display:flex;flex-direction:column;gap:10px;margin-bottom:4px}
.sym-card{background:var(--bg);border-radius:var(--radius-lg);box-shadow:var(--shadow);overflow:hidden;transition:box-shadow .2s,transform .15s;border:1px solid var(--border)}
.sym-card:hover{box-shadow:var(--shadow-lg);transform:translateY(-1px)}
.sym-card.past{opacity:.5}
.sym-card.past .date-box{background:var(--bg4)!important;color:var(--text3)!important}
.card-head{display:flex;align-items:flex-start;gap:14px;padding:18px 18px 12px}
.date-box{flex-shrink:0;background:var(--accent-bg);color:var(--accent);border-radius:12px;padding:10px 12px;text-align:center;min-width:58px}
.date-box .mo{font-size:10px;font-weight:800;letter-spacing:.05em;opacity:.8}
.date-box .dy{font-size:26px;font-weight:900;line-height:1.05}
.date-box .wd{font-size:10px;font-weight:700;margin-top:2px;opacity:.7}
.card-info{flex:1;min-width:0}
.card-name{font-size:15px;font-weight:700;line-height:1.4;margin-bottom:8px;letter-spacing:-.3px;color:var(--text)}
.tags{display:flex;flex-wrap:wrap;gap:5px}
.tag{font-size:12px;font-weight:500;padding:4px 10px;border-radius:20px;background:var(--bg2);color:var(--text2);border:1px solid var(--border);letter-spacing:-.2px}
.tag.blue{background:var(--blue-bg);color:var(--blue);border-color:transparent}
.tag.green{background:var(--green-bg);color:var(--green);border-color:transparent}
.tag.teal{background:var(--teal-bg);color:var(--teal);border-color:transparent}
.tag.amber{background:var(--amber-bg);color:var(--amber);border-color:transparent}
.tag.red{background:var(--red-bg);color:var(--red);border-color:transparent}
.tag.accent{background:var(--accent-bg);color:var(--accent);border-color:transparent}
.tag.link{background:var(--blue-bg);color:var(--blue-mid);border-color:transparent;text-decoration:none;cursor:pointer}
.card-actions{display:flex;gap:4px;flex-shrink:0;margin-top:2px}
.act-btn{background:var(--bg2);border:1px solid var(--border);border-radius:9px;padding:8px 11px;cursor:pointer;font-size:15px;color:var(--text2);transition:all .15s;line-height:1}
.act-btn:hover{background:var(--bg4)}
.act-btn.del:hover{background:var(--red-bg);color:var(--red-mid);border-color:transparent}

/* ── 신청 인원 ── */
.att-section{padding:0 18px 16px}
.att-divider{height:1px;background:var(--border);margin-bottom:12px}
.att-label{font-size:11px;font-weight:800;color:var(--text3);letter-spacing:.08em;text-transform:uppercase;margin-bottom:8px}
.att-pills{display:flex;flex-wrap:wrap;gap:6px}
.att-pill{display:flex;align-items:center;gap:6px;background:var(--green-bg);border-radius:20px;padding:7px 12px 7px 10px;font-size:12px;color:var(--green)}
.att-pill .pname{font-weight:700}
.att-pill .arrow{opacity:.4;font-size:11px}
.att-pill .clinic{color:var(--green-mid)}
.att-pill .del-btn{background:none;border:none;cursor:pointer;color:var(--green-mid);font-size:15px;line-height:1;padding:0;margin-left:2px;opacity:.5;transition:opacity .15s}
.att-pill .del-btn:hover{opacity:1;color:var(--red-mid)}
.add-att-btn{display:flex;align-items:center;gap:5px;background:transparent;border:1.5px dashed var(--border2);border-radius:20px;padding:7px 14px;font-size:12px;font-weight:600;color:var(--text3);cursor:pointer;transition:all .15s}
.add-att-btn:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-bg)}

/* ── FAB ── */
.fab{position:fixed;bottom:28px;right:20px;width:58px;height:58px;border-radius:50%;background:var(--accent);color:#fff;border:none;font-size:28px;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 18px rgba(91,79,232,.45);z-index:100;transition:transform .15s,box-shadow .15s}
.fab:hover{transform:scale(1.08);box-shadow:0 6px 24px rgba(91,79,232,.55)}
.fab:active{transform:scale(.95)}
.bottom-pad{height:88px}
.empty{text-align:center;padding:72px 20px;color:var(--text3);font-size:15px;font-weight:500}

/* ── 달력 ── */
.cal-wrap{padding:16px 16px 80px}
.cal-nav{display:flex;align-items:center;justify-content:space-between;padding:4px 4px 16px}
.cal-nav-btn{background:var(--bg);border:1px solid var(--border2);border-radius:10px;padding:9px 18px;cursor:pointer;font-size:20px;font-weight:600;color:var(--text);transition:all .15s}
.cal-nav-btn:hover{background:var(--bg4)}
.cal-month-title{font-size:20px;font-weight:800;color:var(--text);letter-spacing:-.5px}
.cal-dows{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:4px}
.cal-dow{text-align:center;font-size:11px;font-weight:800;color:var(--text3);padding:6px 0;letter-spacing:.06em}
.cal-dow:first-child{color:var(--red-mid)}
.cal-dow:last-child{color:var(--blue-mid)}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
.cal-day{min-height:74px;background:var(--bg);border-radius:var(--radius);padding:6px;border:1px solid var(--border)}
.cal-day.other{opacity:.2;background:transparent;border-color:transparent}
.cal-day.today{border:2px solid var(--accent);background:var(--accent-bg)}
.cal-date{font-size:12px;font-weight:700;color:var(--text2);margin-bottom:4px;text-align:right}
.cal-day.sun .cal-date{color:var(--red-mid)}
.cal-day.sat .cal-date{color:var(--blue-mid)}
.cal-day.today .cal-date{color:var(--accent);font-weight:900}
.cal-event{font-size:10px;font-weight:600;padding:3px 6px;border-radius:5px;margin-bottom:2px;cursor:pointer;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;line-height:1.4}
.cal-event.open{background:var(--accent-bg);color:var(--accent)}
.cal-event.comp{background:var(--amber-bg);color:var(--amber)}
.cal-event.closed{background:var(--red-bg);color:var(--red)}
.cal-event.tbd{background:var(--teal-bg);color:var(--teal)}
.cal-event.past{background:var(--bg4);color:var(--text3)}

/* ── 모달/시트 ── */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;align-items:flex-end;justify-content:center;backdrop-filter:blur(4px)}
.overlay.open{display:flex}
@media(min-width:520px){.overlay{align-items:center}}
.sheet{background:var(--bg);width:100%;max-width:500px;border-radius:var(--radius-xl) var(--radius-xl) 0 0;padding:22px 24px 38px;max-height:92vh;overflow-y:auto;animation:slideUp .22s cubic-bezier(.32,0,.67,0)}
@media(min-width:520px){.sheet{border-radius:var(--radius-xl);padding:28px}}
@keyframes slideUp{from{transform:translateY(48px);opacity:0}to{transform:none;opacity:1}}
.sheet-handle{width:40px;height:4px;background:var(--border2);border-radius:2px;margin:0 auto 20px}
@media(min-width:520px){.sheet-handle{display:none}}
.sheet-title{font-size:19px;font-weight:800;margin-bottom:20px;letter-spacing:-.5px}
.frow{margin-bottom:16px}
.flabel{font-size:12px;font-weight:700;color:var(--text2);margin-bottom:7px;display:block;letter-spacing:-.1px}
.finput{width:100%;padding:12px 14px;font-size:14px;border:1.5px solid var(--border2);border-radius:var(--radius);background:var(--bg2);color:var(--text);outline:none;transition:border-color .15s;letter-spacing:-.2px}
.finput:focus{border-color:var(--accent);background:var(--bg)}
.f2col{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.sheet-actions{display:flex;gap:10px;margin-top:24px}
.btn-cancel{flex:1;padding:14px;border:1.5px solid var(--border2);border-radius:var(--radius);background:transparent;color:var(--text2);font-size:14px;font-weight:600;cursor:pointer;transition:background .15s}
.btn-cancel:hover{background:var(--bg2)}
.btn-save{flex:2;padding:14px;border:none;border-radius:var(--radius);background:var(--accent);color:#fff;font-size:14px;font-weight:700;cursor:pointer;letter-spacing:-.2px;transition:opacity .15s}
.btn-save:hover{opacity:.88}
.btn-save:disabled{opacity:.35;cursor:not-allowed}
.tab-row{display:flex;gap:8px;margin-bottom:18px}
.tab-btn{flex:1;padding:11px;border:1.5px solid var(--border2);border-radius:var(--radius);background:transparent;color:var(--text2);font-size:13px;font-weight:500;cursor:pointer;transition:all .15s}
.tab-btn.on{background:var(--accent-bg);color:var(--accent);border-color:var(--accent);font-weight:700}
.parse-msg{font-size:12px;min-height:16px;margin-bottom:10px;font-weight:500}
.info-box{background:var(--accent-bg);border-radius:var(--radius);padding:12px 14px;margin-bottom:14px;font-size:12px;color:var(--accent);line-height:1.8;font-weight:500;border:1px solid var(--accent-light)}

/* ── 설정 화면 ── */
.setup-screen{display:none;position:fixed;inset:0;z-index:300;background:var(--bg3);align-items:center;justify-content:center;padding:24px}
.setup-screen.show{display:flex}
.setup-box{background:var(--bg);border-radius:var(--radius-xl);padding:32px 28px;width:100%;max-width:420px;box-shadow:var(--shadow-lg);border:1px solid var(--border)}
.setup-logo{width:52px;height:52px;background:var(--accent);border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:26px;margin-bottom:18px}
.setup-title{font-size:22px;font-weight:800;margin-bottom:6px;letter-spacing:-.5px}
.setup-desc{font-size:13px;color:var(--text2);margin-bottom:24px;line-height:1.65}
.setup-msg{font-size:12px;min-height:18px;margin-bottom:14px;font-weight:500}
.setup-msg.err{color:var(--red-mid)}
.setup-msg.ok{color:var(--teal-mid)}
.setup-divider{height:1px;background:var(--border);margin:18px 0}

/* ── 모바일 최적화 ── */
@media(max-width:480px){
  .topbar{padding:0 12px;height:56px}
  .topbar-logo{width:30px;height:30px;font-size:15px}
  .topbar-title{font-size:14px}
  .topbar-right{gap:4px}
  .btn-icon{padding:8px 9px;font-size:14px}
  .btn-add{padding:8px 12px;font-size:13px}
  .view-tab{padding:11px 14px;font-size:13px}
  .filter-scroll{padding:8px 12px}
  .chip{padding:7px 12px;font-size:12px}
  .month-header{padding:16px 12px 6px;font-size:11px}
  .card-list{padding:0 10px;gap:8px}
  .card-head{gap:10px;padding:14px 14px 10px}
  .date-box{min-width:50px;padding:8px 10px}
  .date-box .dy{font-size:22px}
  .card-name{font-size:14px}
  .tags{gap:4px}
  .tag{font-size:11px;padding:3px 8px}
  .card-actions{flex-direction:column;gap:3px}
  .act-btn{padding:7px 9px;font-size:13px}
  .att-section{padding:0 14px 12px}
  .att-pills{gap:5px}
  .att-pill{font-size:11px;padding:5px 10px 5px 8px}
  .add-att-btn{font-size:11px;padding:5px 12px}
  .cal-wrap{padding:12px 10px 80px}
  .cal-month-title{font-size:16px}
  .cal-day{min-height:56px;padding:4px}
  .cal-date{font-size:10px}
  .cal-event{font-size:9px;padding:2px 3px}
  .fab{width:52px;height:52px;font-size:24px;bottom:20px;right:14px}
  .sheet{padding:18px 18px 32px}
  .sheet-title{font-size:17px}
  .f2col{grid-template-columns:1fr 1fr;gap:8px}
  .finput{padding:10px 12px;font-size:14px}
  .btn-save,.btn-cancel{padding:12px;font-size:14px}
  .setup-box{padding:24px 20px}
  .setup-title{font-size:18px}
}
@media(max-width:360px){
  .f2col{grid-template-columns:1fr}
  .card-actions{flex-direction:row}
  .topbar-logo{display:none}
}
.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--text);color:var(--bg);padding:12px 22px;border-radius:20px;font-size:13px;font-weight:600;z-index:999;opacity:0;transition:all .25s;white-space:nowrap;letter-spacing:-.2px}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1}
.spinner{display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:6px}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<!-- 상단바 -->
<div class="topbar">
  <div class="topbar-left">
    <div class="topbar-logo">🏥</div>
    <div class="topbar-info">
      <div class="topbar-title">동부1 심포지엄</div>
      <div class="topbar-sub"><div class="live-dot"></div><span id="sync-label">불러오는 중...</span></div>
    </div>
  </div>
  <div class="topbar-right">
    <button class="btn-icon" onclick="openLog()" title="로그">📋</button>
    <button class="btn-icon" onclick="openMembers()" title="인원관리">👥</button>
    <button class="btn-icon" onclick="openSetup()" title="설정">⚙️</button>
    <button class="btn-icon" onclick="loadData()" title="새로고침">🔄</button>
    <button class="btn-add" onclick="openAddSymp()"><span>＋</span> 등록</button>
  </div>
</div>

<!-- 뷰 탭 -->
<div class="view-tabs">
  <button class="view-tab on" id="vt-list" onclick="setView('list')">📋 목록</button>
  <button class="view-tab" id="vt-cal" onclick="setView('cal')">📅 달력</button>
</div>

<!-- 필터 -->
<div class="filter-scroll" id="filter-row">
  <div class="filter-inner">
    <button class="chip on" onclick="setFilter('all',this)">전체</button>
    <button class="chip" onclick="setFilter('upcoming',this)">예정</button>
    <button class="chip" onclick="setFilter('5',this)">5월</button>
    <button class="chip" onclick="setFilter('6',this)">6월</button>
    <button class="chip" onclick="setFilter('7p',this)">7월+</button>
    <button class="chip" onclick="setFilter('open',this)">신청 가능</button>
    <button class="chip" onclick="setFilter('applied',this)">신청 완료</button>
    <button class="chip" onclick="setFilter('done',this)">✅ 완료</button>
  </div>
</div>

<!-- 목록 뷰 -->
<div id="view-list"><div id="main-list"></div></div>

<!-- 달력 뷰 -->
<div id="view-cal" style="display:none">
  <div class="cal-wrap">
    <div class="cal-nav">
      <button class="cal-nav-btn" onclick="calMove(-1)">‹</button>
      <div class="cal-month-title" id="cal-title"></div>
      <button class="cal-nav-btn" onclick="calMove(1)">›</button>
    </div>
    <div class="cal-dows">
      <div class="cal-dow">일</div><div class="cal-dow">월</div><div class="cal-dow">화</div>
      <div class="cal-dow">수</div><div class="cal-dow">목</div><div class="cal-dow">금</div><div class="cal-dow">토</div>
    </div>
    <div class="cal-grid" id="cal-grid"></div>
  </div>
</div>

<div class="bottom-pad"></div>
<button class="fab" onclick="openAddSymp()">＋</button>

<!-- 설정 -->
<div class="setup-screen" id="setup-screen">
  <div class="setup-box">
    <div class="setup-logo">🔑</div>
    <div class="setup-title">초기 설정</div>
    <div class="setup-desc">처음 한 번만 입력하면 이 기기에 저장됩니다.</div>
    <div class="frow">
      <label class="flabel">GitHub Token</label>
      <input type="password" id="setup-gh-token" class="finput" placeholder="ghp_...">
    </div>
    <div class="setup-divider"></div>
    <div class="frow">
      <label class="flabel">Gemini API Key <span style="font-weight:400;color:var(--text3)">(AI 분석용 — 선택)</span></label>

<script>
const GH_OWNER='jinhyuck963-lab';
const GH_REPO='dongbu1-symposium-Public';
const GH_API=`https://api.github.com/repos/${GH_OWNER}/${GH_REPO}/contents/data.json`;
const K_GH='dongbu1_gh', K_GM='dongbu1_gm', LOG_KEY='dongbu1_log', K_MEMBERS='dongbu1_members';
const DEFAULT_MEMBERS=['이상원','김은주','김은종','소민섭','허종환','최진혁','고준원'];
const getMembers=()=>JSON.parse(localStorage.getItem(K_MEMBERS)||'null')||DEFAULT_MEMBERS;
const MO=['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
const WD=['일','월','화','수','목','금','토'];
const ST={open:{l:'신청 가능',c:'green'},comp:{l:'경쟁 모객',c:'amber'},closed:{l:'마감',c:'red'},tbd:{l:'공지 예정',c:'teal'}};
const SEED=[
  {id:'s1',name:'DEEP Symposium — 소피텔 앰배서더 서울',ds:'2026-05-19',de:'2026-05-19',product:'나보타, 브이올렛',pm:'이현진 PM',to:'나보타·브이올렛 매출처 O',link:'',status:'open',att:[{p:'이상원',c:'섬세이의원',d:'홍석우'}]},
  {id:'s2',name:'롯데호텔 소공동 — 피콕스위트',ds:'2026-05-16',de:'2026-05-17',product:'세비카F, 웰체크, 카트BP',pm:'김정욱 PM',to:'사업부 18명',link:'',status:'open',att:[{p:'김은종',c:'세실내과 *연자',d:'이치훈'},{p:'김은종',c:'성심의원',d:'전병수'},{p:'이상원',c:'연세숲내과',d:'김채원'},{p:'허종환',c:'바른마음내과',d:'김주경'}]},
  {id:'s3',name:'롯데호텔 소공동 — 가넷스위트',ds:'2026-05-16',de:'2026-05-17',product:'모비케어, 릭시아나',pm:'심연주 PM',to:'사업부 7명',link:'',status:'open',att:[{p:'김은주',c:'둔촌봄날이비인후과',d:'배승희'}]},
  {id:'s4',name:'DMD 심포지엄',ds:'2026-05-16',de:'2026-05-17',product:'펙수클루',pm:'이민호 PM',to:'30명',link:'',status:'open',att:[]},
  {id:'s5',name:'제주 엠버퓨어힐',ds:'2026-05-23',de:'2026-05-24',product:'골다공증/우울증/위장관질환',pm:'김경수 PM',to:'사무소 TO X (여유 O)',link:'',status:'comp',att:[]},
  {id:'s6',name:'경주 라한호텔',ds:'2026-05-30',de:'2026-05-31',product:'젤렌카, 젤토파, 스토보클로, 펙수클루',pm:'윤형주 PM',to:'류마티스내과 전문의 50명',link:'',status:'open',att:[]},
  {id:'s7',name:'DMD 심포지엄 (5월)',ds:'2026-05-30',de:'2026-05-31',product:'바로에젯, 크레젯',pm:'양진모 PM',to:'미정',link:'',status:'open',att:[]},
  {id:'s8',name:'풀만 서울 이스트폴',ds:'2026-06-20',de:'2026-06-21',product:'우루사, 실리스칸',pm:'김민수 PM',to:'1명',link:'',status:'open',att:[{p:'최진혁',c:'365플러스내과',d:'유정선'}]},
  {id:'s9',name:'힐리언스 심포지엄',ds:'2026-06-20',de:'2026-06-21',product:'크레젯, 리토바젯, 바로에젯, 크레스토',pm:'윤인성 PM',to:'1-2명 예상',link:'',status:'tbd',att:[]},
  {id:'s10',name:'르메르디앙 서울 명동',ds:'2026-06-27',de:'2026-06-28',product:'릭시아나',pm:'우찬하 PM',to:'1명',link:'',status:'open',att:[{p:'이상원',c:'365서울연합의원',d:''}]},
];

let data=[], fileSha='', filter='all';
const ghToken=()=>localStorage.getItem(K_GH)||'';
const gmKey=()=>localStorage.getItem(K_GM)||'';

function openSetup(){
  document.getElementById('setup-gh-token').value=ghToken();
  document.getElementById('setup-gemini-key').value=gmKey();
  document.getElementById('setup-msg').textContent='';
  document.getElementById('setup-screen').classList.add('show');
}
function closeSetup(){ document.getElementById('setup-screen').classList.remove('show'); }
async function saveSetup(){
  const gh=document.getElementById('setup-gh-token').value.trim();
  const gm=document.getElementById('setup-gemini-key').value.trim();
  if(!gh){ setSetupMsg('GitHub Token을 입력해주세요.',true); return; }
  setBtn('btn-setup-save',true,'저장 중...');
  try{
    const r=await fetch(`https://api.github.com/repos/${GH_OWNER}/${GH_REPO}`,{headers:{Authorization:`token ${gh}`,Accept:'application/vnd.github.v3+json'}});
    if(!r.ok){ setSetupMsg('GitHub Token이 유효하지 않습니다.',true); setBtn('btn-setup-save',false,'저장 및 시작'); return; }
    localStorage.setItem(K_GH,gh);
    if(gm) localStorage.setItem(K_GM,gm);
    setSetupMsg('✅ 저장됐습니다!',false);
    setTimeout(()=>{ closeSetup(); loadData(); },800);
  }catch(e){ setSetupMsg('연결 오류.',true); }
  setBtn('btn-setup-save',false,'저장 및 시작');
}
function setSetupMsg(m,e){ const el=document.getElementById('setup-msg'); el.textContent=m; el.className='setup-msg'+(e?' err':' ok'); }

function b64enc(s){ const b=new TextEncoder().encode(s); let r=''; b.forEach(c=>r+=String.fromCharCode(c)); return btoa(r); }
function b64dec(b){ const s=atob(b.replace(/\n/g,'')); const u=new Uint8Array(s.length); for(let i=0;i<s.length;i++)u[i]=s.charCodeAt(i); return new TextDecoder().decode(u); }

async function loadData(){
  const tok=ghToken(); if(!tok){ openSetup(); return; }
  setSyncLabel('동기화 중...');
  try{
    const r=await fetch(GH_API,{headers:{Authorization:`token ${tok}`,Accept:'application/vnd.github.v3+json'}});
    if(r.status===401||r.status===403){ localStorage.removeItem(K_GH); openSetup(); return; }
    if(r.status===404){ data=SEED; await pushData(data,''); }
    else if(r.ok){ const j=await r.json(); fileSha=j.sha; data=JSON.parse(b64dec(j.content)); }
    else throw new Error();
  }catch(e){ if(!data.length)data=SEED; setSyncLabel('오프라인'); render(); return; }
  setSyncLabel(timeStr()+' 기준'); render();
}
async function pushData(d,sha){
  const tok=ghToken();
  const body={message:'업데이트',content:b64enc(JSON.stringify(d,null,2))};
  if(sha) body.sha=sha;
  const r=await fetch(GH_API,{method:'PUT',headers:{Authorization:`token ${tok}`,Accept:'application/vnd.github.v3+json','Content-Type':'application/json'},body:JSON.stringify(body)});
  if(r.status===401||r.status===403){ localStorage.removeItem(K_GH); openSetup(); throw new Error('401'); }
  if(!r.ok) throw new Error('저장실패');
  const j=await r.json(); fileSha=j.content.sha;
}
async function saveData(){
  try{ await pushData(data,fileSha); setSyncLabel(timeStr()+' 저장됨'); toast('저장됐습니다 ✓'); }
  catch(e){ if(e.message!=='401') toast('저장 실패'); }
}

function isPast(s){ const t=new Date(); t.setHours(0,0,0,0); return new Date(s.de+'T00:00:00')<t; }

function setFilter(f,el){ filter=f; document.querySelectorAll('.chip').forEach(c=>c.classList.remove('on')); el.classList.add('on'); render(); }

function render(){
  let items=[...data].sort((a,b)=>a.ds.localeCompare(b.ds));
  if(filter==='upcoming') items=items.filter(s=>!isPast(s));
  else if(filter==='done') items=items.filter(s=>isPast(s));
  else if(filter==='5') items=items.filter(s=>s.ds.startsWith('2026-05'));
  else if(filter==='6') items=items.filter(s=>s.ds.startsWith('2026-06'));
  else if(filter==='7p') items=items.filter(s=>s.ds>='2026-07');
  else if(filter==='open') items=items.filter(s=>s.status!=='closed'&&!isPast(s));
  else if(filter==='applied') items=items.filter(s=>s.att&&s.att.length>0);
  else items.sort((a,b)=>{ const ap=isPast(a),bp=isPast(b); if(ap!==bp)return ap?1:-1; return a.ds.localeCompare(b.ds); });

  const el=document.getElementById('main-list');
  if(!items.length){ el.innerHTML='<div class="empty">📭<br>해당하는 심포지엄이 없습니다.</div>'; return; }
  const groups={};
  items.forEach(s=>{ const k=isPast(s)?'✅ 완료':s.ds.substring(0,7); if(!groups[k])groups[k]=[]; groups[k].push(s); });
  const keys=Object.keys(groups).sort((a,b)=>{ if(a.startsWith('✅'))return 1; if(b.startsWith('✅'))return -1; return a.localeCompare(b); });
  let html='';
  for(const k of keys){
    if(k.startsWith('✅')){ html+=`<div class="month-header">✅ 완료된 심포지엄</div>`; }
    else{ const[y,m]=k.split('-'); html+=`<div class="month-header">${y}년 ${parseInt(m)}월</div>`; }
    html+=`<div class="card-list">`;
    groups[k].forEach(s=>{ html+=card(s); });
    html+=`</div>`;
  }
  el.innerHTML=html;
}

function card(s){
  const ds=new Date(s.ds+'T00:00:00'),de=new Date(s.de+'T00:00:00');
  const same=s.ds===s.de;
  const dStr=same?`${ds.getMonth()+1}/${ds.getDate()}(${WD[ds.getDay()]})`:`${ds.getMonth()+1}/${ds.getDate()}–${de.getDate()}(${WD[ds.getDay()]}·${WD[de.getDay()]})`;
  const st=ST[s.status]||ST.open;
  const ac=(s.att||[]).length;
  return `
  <div class="sym-card${isPast(s)?' past':''}" id="card-${s.id}" onclick="openDetail('${s.id}')" style="cursor:pointer">
    <div class="card-head">
      <div class="date-box"><div class="mo">${MO[ds.getMonth()]}</div><div class="dy">${ds.getDate()}</div><div class="wd">${WD[ds.getDay()]}</div></div>
      <div class="card-info">
        <div class="card-name">${s.name}</div>
        <div class="tags">
          <span class="tag">${dStr}</span>
          ${s.product?`<span class="tag blue">${s.product}</span>`:''}
          ${s.pm?`<span class="tag">${s.pm}</span>`:''}
          ${s.to?`<span class="tag teal">TO: ${s.to}</span>`:''}
          <span class="tag ${st.c}">${st.l}</span>
          ${ac>0?`<span class="tag green">👥 ${ac}명 신청</span>`:''}
          ${s.link?`<a href="${s.link}" target="_blank" class="tag link" onclick="event.stopPropagation()">🔗 링크</a>`:''}
        </div>
      </div>

async function parseMail(){
  const text=document.getElementById('mail-paste').value.trim();
  if(!text){ toast('메일 내용을 붙여넣어 주세요'); return; }
  const gm=gmKey();
  if(!gm){ setParseMsg('❌ Gemini API Key가 없습니다. ⚙️ 설정에서 입력해주세요.',true); return; }
  setBtn('btn-parse',true,'분석 중...');
  setParseMsg('AI가 분석하고 있습니다...',false);
  document.getElementById('parse-result').style.display='none';
  try{
    const res=await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${gm}`,{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        contents:[{parts:[{text:`다음 심포지엄 안내 메일에서 정보를 추출해서 JSON 객체만 출력해. 설명 없이 JSON만.\n{"name":"심포지엄명 — 장소","dateStart":"YYYY-MM-DD","dateEnd":"YYYY-MM-DD","product":"품목","pm":"PM명","perOfficeTo":0,"totalTo":0,"officeCount":0,"toNote":"TO원문","link":"링크URL또는빈문자열","status":"open"}\n메일:\n${text.slice(0,5000)}`}]}],
        generationConfig:{temperature:0,maxOutputTokens:8192}
      })
    });
    if(!res.ok) throw new Error('API '+res.status);
    const j=await res.json();
    const raw=j.candidates?.[0]?.content?.parts?.[0]?.text||'';
    const m=raw.replace(/```json|```/g,'').trim().match(/\{[\s\S]*\}/);
    if(!m) throw new Error('JSON 없음');
    const p=JSON.parse(m[0]);
    let to='';
    if(p.perOfficeTo>0) to=`${p.perOfficeTo}명`;
    else if(p.totalTo>0&&p.officeCount>0) to=`${Math.floor(p.totalTo/p.officeCount)}명 (전체 ${p.totalTo}명 ÷ ${p.officeCount}개 사무소)`;
    else if(p.totalTo>0) to=`확인 필요 (전체 ${p.totalTo}명)`;
    else to=p.toNote||'TO 확인 필요';
    document.getElementById('ps-start').value=p.dateStart||'';
    document.getElementById('ps-end').value=p.dateEnd||'';
    document.getElementById('ps-name').value=p.name||'';
    document.getElementById('ps-product').value=p.product||'';
    document.getElementById('ps-pm').value=p.pm||'';
    document.getElementById('ps-to').value=to;
    document.getElementById('ps-link').value=p.link||'';
    document.getElementById('ps-status').value=p.status||'open';
    document.getElementById('parse-result').style.display='block';
    setParseMsg('✅ 분석 완료 — 확인 후 저장하세요',false);
  }catch(e){ setParseMsg('❌ 분석 실패 ('+e.message+')',true); }
  setBtn('btn-parse',false,'🤖 AI로 자동 분석');
}
function setParseMsg(m,e){ const el=document.getElementById('parse-msg'); el.textContent=m; el.style.color=e?'var(--red-mid)':'var(--teal-mid)'; }

function openMembers(){
  renderMembersList();

  document.getElementById('ov-members').classList.add('open');
}
function renderMembersList(){
  const members=getMembers();
  document.getElementById('members-list').innerHTML=members.map((m,i)=>`
    <div style="display:flex;align-items:center;justify-content:space-between;padding:10px 12px;background:var(--bg2);border-radius:var(--radius);margin-bottom:6px;border:1px solid var(--border)">
      <span style="font-size:14px;font-weight:600">${m}</span>
      <button onclick="deleteMember(${i})" style="background:var(--red-bg);border:none;border-radius:8px;padding:5px 10px;cursor:pointer;color:var(--red-mid);font-size:12px;font-weight:600">삭제</button>
    </div>`).join('');
  // fp-person select 업데이트
  const sel=document.getElementById('fp-person');
  if(sel){ sel.innerHTML=members.map(m=>`<option>${m}</option>`).join(''); }
}
function addMember(){
  const input=document.getElementById('new-member-input');
  const name=input.value.trim();
  if(!name){ toast('이름을 입력해주세요'); return; }
  const members=getMembers();
  if(members.includes(name)){ toast('이미 있는 이름입니다'); return; }
  members.push(name);
  localStorage.setItem(K_MEMBERS,JSON.stringify(members));
  input.value='';
  renderMembersList();
  toast(`${name} 추가됐습니다`);
}
function deleteMember(idx){
  const members=getMembers();
  if(members.length<=1){ toast('최소 1명은 있어야 합니다'); return; }
  if(!confirm(`${members[idx]}을(를) 삭제할까요?`)) return;
  members.splice(idx,1);
  localStorage.setItem(K_MEMBERS,JSON.stringify(members));
  renderMembersList();
  toast('삭제됐습니다');
}

let currentView='list', calYear=new Date().getFullYear(), calMonth=new Date().getMonth();
function setView(v){
  currentView=v;
  document.getElementById('vt-list').classList.toggle('on',v==='list');
  document.getElementById('vt-cal').classList.toggle('on',v==='cal');
  document.getElementById('view-list').style.display=v==='list'?'block':'none';
  document.getElementById('view-cal').style.display=v==='cal'?'block':'none';
  document.getElementById('filter-row').style.display=v==='list'?'block':'none';
  if(v==='cal') renderCal();
}
function calMove(dir){ calMonth+=dir; if(calMonth<0){calMonth=11;calYear--;} if(calMonth>11){calMonth=0;calYear++;} renderCal(); }
function renderCal(){
  const today=new Date(); today.setHours(0,0,0,0);
  document.getElementById('cal-title').textContent=`${calYear}년 ${calMonth+1}월`;
  const firstDay=new Date(calYear,calMonth,1).getDay(), lastDate=new Date(calYear,calMonth+1,0).getDate(), prevLast=new Date(calYear,calMonth,0).getDate();
  let html='';
  for(let i=0;i<42;i++){
    let d, isOther=false; const dow=i%7;
    if(i<firstDay){d=prevLast-(firstDay-i-1);isOther=true;}
    else if(i>=firstDay+lastDate){d=i-firstDay-lastDate+1;isOther=true;}
    else d=i-firstDay+1;
    const dateStr=isOther?null:`${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const isToday=dateStr&&new Date(dateStr+'T00:00:00').getTime()===today.getTime();
    let ev='';
    if(dateStr) data.filter(s=>s.ds<=dateStr&&s.de>=dateStr).forEach(s=>{ ev+=`<div class="cal-event ${isPast(s)?'past':s.status}" onclick="openEdit('${s.id}')" title="${s.name}">${s.name.split('—')[0].trim()}</div>`; });
    html+=`<div class="cal-day${isOther?' other':''}${isToday?' today':''}${dow===0?' sun':''}${dow===6?' sat':''}"><div class="cal-date">${d}</div>${ev}</div>`;
  }
  document.getElementById('cal-grid').innerHTML=html;
}

function setSyncLabel(t){ document.getElementById('sync-label').textContent=t; }

function setBtn(id,disabled,label){ const b=document.getElementById(id); if(!b)return; b.disabled=disabled; if(label) b.innerHTML=disabled?`<span class="spinner"></span>${label}`:label; }
let _tt;
